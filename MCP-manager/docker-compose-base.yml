name: mcp-manager-base

services:
  crawl4ai:
    image: unclecode/crawl4ai:0.8.0
    container_name: crawl4ai
    env_file:
      - .env
    ports:
      - "${CRAWL4AI_PORT:-11235}:11235"
    shm_size: 1gb
    restart: unless-stopped
    networks:
      - mcp-manager-network

  searxng:
    image: searxng/searxng:2026.3.6-0716de6bc
    container_name: searxng
    env_file:
      - .env
    ports:
      - "${SEARXNG_PORT:-8080}:8080"
    volumes:
      - ./config/:/etc/searxng/
      - ./data/:/var/cache/searxng/
    restart: unless-stopped
    networks:
      - mcp-manager-network


networks:
  mcp-manager-network:
    driver: bridge
    name: mcp-manager-network
    # add subnet for custom network
    ipam:
      config:
        # different docker compose need to set different subnet to avoid conflict
        - subnet: 10.200.1.0/24
